version: '3.9'
services:
  website:
    image: node:24-alpine
    container_name: website-dev
    restart: none
    volumes:
      - ./:/home/node
    env_file:
      - ../envs/website.env
    ports:
      - "3000:3000"
    networks:
      - db-net
    command: tail -f /home/node/Dockerfile
networks:
  db-net:
